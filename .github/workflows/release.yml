name: Release

on:
  workflow_dispatch:
    inputs:
      bump_rule:
        description: 'Version Bump Rule'
        required: true
        default: 'patch'
        type: choice
        options:
        - patch
        - minor
        - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/pywhatwgurl/
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Calculate Next Version
        id: version
        run: python util/bump_version.py ${{ inputs.bump_rule }}

      - name: Create and Push Tag
        run: |
          git tag ${{ steps.version.outputs.new_tag }}
          git push origin ${{ steps.version.outputs.new_tag }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Build package
        run: uv build

      - name: Generate SBOM
        run: |
          uv export --no-dev --no-hashes --format=requirements-txt > requirements.txt
          uv run cyclonedx-py requirements requirements.txt --output-format json --output-file sbom.json

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new_tag }}
          generate_release_notes: true
          files: sbom.json
